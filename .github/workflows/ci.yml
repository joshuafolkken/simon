name: CI
permissions:
  contents: read
  packages: read

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'

      - name: Setup ESLint cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: eslint-cache
        with:
          path: |
            .eslintcache
          key: ${{ runner.os }}-eslint-cache-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('eslint.config.js', 'eslint/**/*.ts') }}
          restore-keys: |
            ${{ runner.os }}-eslint-cache-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-eslint-cache-

      - name: Setup safe-chain
        run: pnpm dlx @aikidosec/safe-chain setup-ci

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run security audit
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
        with:
          scan-args: --lockfile=pnpm-lock.yaml

      - name: Run spell check
        run: pnpm exec cspell . --dot

      - name: Prepare
        run: pnpm prepare

      - name: Run type check
        run: pnpm exec svelte-kit sync && pnpm exec svelte-check --tsconfig ./tsconfig.json --threshold error

      - name: Run prettier check
        run: pnpm exec prettier --check .

      - name: Run eslint check
        run: pnpm exec eslint . --cache --cache-strategy content

      - name: Run unit tests
        run: pnpm exec vitest run

      - name: Build for size check
        run: pnpm build

      - name: Check bundle size
        run: pnpm size-limit

  e2e-detect:
    name: Detect E2E
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check for Playwright config
        id: check
        run: |
          if [ -f playwright.config.ts ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

  e2e:
    name: E2E
    needs: e2e-detect
    if: needs.e2e-detect.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Playwright preview は localhost:4173。ワークフロー共通の BETTER_AUTH_URL（本番）を
    # 引き継ぐと Better Auth が origin を拒否する（CI E2E では本番 URL は使わない）。
    # ホスト/ポートは e2e/e2e-constants.ts の E2E_PREVIEW_PORT（4173）と一致させること。
    env:
      BETTER_AUTH_URL: http://localhost:4173
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'

      - name: Setup build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: build-cache
        with:
          path: |
            .svelte-kit
          key: ${{ runner.os }}-build-cache-e2e-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('svelte.config.js', 'vite.config.ts', 'tsconfig.json', 'src/lib/server/auth.ts') }}
          restore-keys: |
            ${{ runner.os }}-build-cache-e2e-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-build-cache-e2e-

      - name: Setup Playwright cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: playwright-cache
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-cache-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-cache-

      - name: Setup safe-chain
        run: pnpm dlx @aikidosec/safe-chain setup-ci

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install Playwright system dependencies
        run: pnpm exec playwright install-deps chromium

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium

      - name: Build application
        env:
          E2E_CLEANUP_ENABLED: '1'
        run: pnpm build

      - name: Run E2E tests
        run: pnpm exec playwright test

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
