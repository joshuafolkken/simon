sonar.projectKey=joshuafolkken_simon
sonar.organization=joshuafolkken

# Pure JavaScript files only
sonar.lang.patterns.js=**/*.js,**/*.jsx,**/*.cjs,**/*.mjs
# TypeScript files including .svelte and .vue (which often use TypeScript)
sonar.lang.patterns.ts=**/*.ts,**/*.tsx,**/*.cts,**/*.mts,**/*.vue,**/*.svelte
# Exclude .svelte from CSS patterns
sonar.lang.patterns.css=**/*.css,**/*.less,**/*.scss,**/*.sass

# Disable coverage checks
sonar.coverage.exclusions=**/*

# Exclude upstream-synced bootstrap scripts and dev/CI tooling from analysis.
# .claude/ hosts setup shell scripts synced from joshuafolkken/tasks (must not drift).
# scripts/ hosts git / issue / overrides / telegram workflow tooling — not production code.
sonar.exclusions=.claude/**,scripts/**

# Files to exclude from the duplicate check
# Test files have inherently repetitive boilerplate (setup/teardown patterns)
sonar.cpd.exclusions=**/*.spec.ts,**/*.e2e.ts

# Use SonarCloud-compatible tsconfig
sonar.typescript.tsconfigPath=tsconfig.sonar.json
